<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SUS-Imposter: Ein Partyspiel im Pass-the-Phone-Prinzip">
    <meta name="theme-color" content="#6200ea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SUS-Imposter">
    
    <title>SUS-Imposter</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%236200ea' width='192' height='192'/><text x='50%' y='50%' font-size='120' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>SUS</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%236200ea' width='192' height='192' rx='45'/><text x='50%' y='50%' font-size='120' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>SUS</text></svg>">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- Konfigurationsbildschirm -->
    <div id="configScreen" class="screen active">
        <div class="container">
            <h1>🎭 SUS-Imposter</h1>
            <p class="subtitle">Das Partyspiel für dein Smartphone</p>
            
            <form id="configForm">
                <div class="form-group">
                    <label for="playerCount">Anzahl Spielende:</label>
                    <div class="slider-container">
                        <input type="range" id="playerCount" min="3" max="12" value="6" class="slider">
                        <span id="playerCountValue">6</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="imposterCount">Anzahl Imposter:</label>
                    <div class="button-group">
                        <button type="button" class="btn-toggle active" data-value="1">1</button>
                        <button type="button" class="btn-toggle" data-value="2">2</button>
                    </div>
                    <input type="hidden" id="imposterCount" value="1">
                </div>
                
                <div class="form-group">
                    <label for="category">Wortkategorie:</label>
                    <select id="category">
                        <option value="objects">Gegenstände</option>
                        <option value="animals">Tiere</option>
                        <option value="places">Orte</option>
                        <option value="food">Essen & Trinken</option>
                        <option value="jobs">Berufe</option>
                        <option value="sports">Sport & Freizeit</option>
                        <option value="technology">Technologie</option>
                        <option value="movies">Filme & TV</option>
                    </select>
                </div>
                
                <button type="submit" class="btn-primary">Spiel starten</button>
            </form>
        </div>
    </div>

    <!-- Spieler-Nummern Bildschirm -->
    <div id="playerScreen" class="screen">
        <div class="container">
            <h2>Spieler <span id="currentPlayer">1</span></h2>
            <p class="subtitle">Tippe auf die Karte um deine Rolle zu sehen</p>
            
            <div class="card-container">
                <div id="roleCard" class="card">
                    <div class="card-content">
                        <span class="card-instruction">Tippe hier</span>
                    </div>
                </div>
            </div>
            
            <div class="button-group">
                <button id="revealBtn" class="btn-secondary">Karte aufdecken</button>
                <button id="hideBtn" class="btn-secondary" style="display: none;">Karte verbergen</button>
            </div>
            
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <p class="progress-text">Spieler <span id="progressText">1</span> / <span id="totalPlayers">6</span></p>
            
            <button id="nextPlayerBtn" class="btn-primary" style="display: none;">Nächster Spieler</button>
        </div>
    </div>

    <!-- Diskussions-Bildschirm -->
    <div id="discussionScreen" class="screen">
        <div class="container">
            <h2>Diskussionsphase</h2>
            
            <div class="timer-container">
                <div id="timer" class="timer">
                    <span id="timerMinutes">3</span>:<span id="timerSeconds">00</span>
                </div>
                <div class="button-group">
                    <button id="startTimerBtn" class="btn-secondary">Timer starten</button>
                    <button id="pauseTimerBtn" class="btn-secondary" style="display: none;">Pause</button>
                </div>
            </div>
            
            <p class="discussion-hint">Diskutiert wer der Imposter ist!</p>
            
            <button id="revealAnswerBtn" class="btn-primary">Auflösen</button>
        </div>
    </div>

    <!-- Auflösungs-Bildschirm -->
    <div id="revealScreen" class="screen">
        <div class="container">
            <h2>🎉 Auflösung</h2>
            
            <div class="reveal-content">
                <div class="reveal-box">
                    <h3>Das Wort war:</h3>
                    <p id="revealedWord" class="revealed-word">---</p>
                </div>
                
                <div class="reveal-box">
                    <h3>Die Imposter waren:</h3>
                    <div id="revealedImposters" class="imposter-list">
                        <!-- Wird mit JS gefüllt -->
                    </div>
                </div>
            </div>
            
            <button id="restartBtn" class="btn-primary">Neues Spiel</button>
        </div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
